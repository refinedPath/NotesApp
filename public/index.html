<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotesApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./css/styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="./js/app.js"></script>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">NotesApp</a>

      <button class="btn btn-outline-tertiary ms-auto me-2 order-lg-last" type="button" id="newNoteBtn"
        aria-label="New note" data-bs-toggle="modal" data-bs-target="#noteModal" data-mode="create">
        <i class="bi bi-plus-circle"></i>
        <span class="d-none d-sm-inline">New note</span>
      </button>

      <button class="btn btn-outline-tertiary d-lg-none" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <i class="bi bi-list"></i>
      </button>

      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav">
          <a class="nav-link active" href="#">Home</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="container mt-4">

    <div class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center"
      id="notesLoadingState" style="background: rgba(0, 0, 0, 0.5); z-index: 1050;">
      <div class="spinner-border text-light" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div class="d-none text-center line-height-xxl py-5 my-5" id="notesEmptyState">
      <i class="bi bi-journal-text" style="font-size: 4rem;"></i>
      <p class="h5 mt-3 fw-semibold">No notes yet.</p>
      <p class="mb-0">Click <button class="btn btn-outline-tertiary" type="button" id="emptyStateNewNoteBtn"
          aria-label="New note" data-bs-toggle="modal" data-bs-target="#noteModal" data-mode="create">
          <i class="bi bi-plus-circle"></i>
          <span class="d-none d-sm-inline">New note</span>
        </button> to add one.</p>
    </div>

    <div class="row" id="notesGrid"></div>

  </main>

  <!-- Modals -->
  <div class="modal fade" id="noteModal" tabindex="-1" aria-labelledby="noteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">

        <div class="modal-header">
          <h1 class="modal-title fs-5" id="noteModalLabel">New note</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">

          <!-- Form -->
          <form id="noteForm" name="noteForm">
            <div class="mb-3">
              <input type="hidden" id="noteId" name="noteId">
              <label for="title" class="form-label">Title</label>
              <input type="text" class="form-control" id="title" name="title" placeholder="Title (required)" required
                maxlength="255" aria-describedby="titleCounter">
              <div class="form-text text-end" id="titleCounter">0 / 255</div>
            </div>

            <div class="mb-3">
              <label for="content" class="form-label">Content</label>
              <textarea class="form-control" id="content" name="content" rows="4" placeholder="Content (optional)"
                maxlength="5000" aria-describedby="contentCounter"></textarea>
              <div class="form-text text-end" id="contentCounter">0 / 5000</div>
            </div>

            <div class="mb-3">
              <label for="color" class="form-label">Color</label>
              <input type="color" class="form-control" id="color" name="color" value="#212529">
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="isPinned" name="isPinned">
              <label for="isPinned" class="form-check-label">Pin note</label>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-tertiary" data-bs-dismiss="modal"><i
              class="bi bi-x-circle me-1"></i>Close</button>
          <button type="submit" form="noteForm" class="btn btn-outline-tertiary" id="noteSubmitBtn"><i
              class="bi bi-plus-circle me-1"></i>Create</button>
        </div>

      </div>
    </div>
  </div>

</body>

</html>
